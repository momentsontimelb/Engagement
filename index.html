<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Invited</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Playfair+Display:ital,wght@0,500;1,400&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Reusable heart-outline sprite -->
  <svg style="display:none">
    <symbol id="heart-outline" viewBox="0 0 32 29">
      <path d="M16 28 C16 28 2 18.5 2 9.8 C2 4.9 5.8 1.5 10.1 1.5 C12.8 1.5 15 2.9 16 5 C17 2.9 19.2 1.5 21.9 1.5 C26.2 1.5 30 4.9 30 9.8 C30 18.5 16 28 16 28 Z"
        fill="none" stroke="currentColor" stroke-width="1.6"/>
    </symbol>
  </svg>

  <div class="app">

    <!-- ===================== SCREEN 1: ENVELOPE ===================== -->
    <section class="screen envelope-screen" id="envelopeScreen">
      <div class="hearts-layer" id="heartsEnvelope"></div>

      <div class="fold fold-top"></div>
      <div class="fold fold-right"></div>
      <div class="fold fold-bottom"></div>
      <div class="fold fold-left"></div>

      <div class="wax-seal" id="waxSeal">
        <div class="wax-ring"></div>
        <div class="wax-sphere">
          <span class="wax-initials" id="waxInitials">A &amp; L</span>
          <svg class="wax-heart"><use href="#heart-outline"/></svg>
        </div>
      </div>

      <p class="tap-hint" id="tapHint">Tap to open</p>
    </section>

    <!-- ===================== SCREEN 2: INVITATION ===================== -->
    <section class="screen invite-screen" id="inviteScreen">
      <div class="bg-photo"></div>
      <div class="bg-overlay"></div>
      <div class="lights-row"></div>
      <div class="hearts-layer" id="heartsInvite"></div>

      <div class="invite-content">
        <h1 class="invite-names">
          <span id="nameOne">Abdulrhman</span>
          <span class="amp">&amp;</span>
          <span id="nameTwo">Lara</span>
        </h1>

        <p class="invite-subtitle" id="inviteSubtitle">Two Hearts, One Love, Endless Joy</p>

        <div class="rings-graphic" aria-hidden="true">
          <span class="ring ring-a"></span>
          <span class="ring ring-b"></span>
        </div>

        <div class="details-card">
          <div class="detail-item-r">
            <span class="detail-label" id="labelDate">Date</span>
            <span class="detail-value" id="detailDate">September 12, 2026</span>
          </div>
          <div class="detail-item-l">
            <span class="detail-label" id="labelTime">Time</span>
            <span class="detail-value" id="detailTime">6:00 PM</span>
          </div>
          <div class="detail-item-r">
            <span class="detail-label" id="labelVenue">Venue</span>
            <span class="detail-value" id="detailVenue">The Grand Garden Hall</span>
          </div>
          <div class="detail-item-l">
            <span class="detail-label" id="labelCity">City</span>
            <span class="detail-value" id="detailCity">Beirut</span>
          </div>
        </div>
      </div>
    </section>

  </div>

<script src="script.js"></script>
</body>
</html>
